name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Determine the next version from conventional commits
  # ────────────────────────────────────────────────────────────────────────────
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.bump.outputs.next_version }}
      release_needed: ${{ steps.bump.outputs.release_needed }}
      changelog: ${{ steps.bump.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can walk commits back to last tag

      - name: Compute version bump
        id: bump
        shell: bash
        run: |
          # ── find the last semver tag ──────────────────────────────────────
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
                       --sort=-version:refname | head -1)

          if [ -z "$LAST_TAG" ]; then
            BASE=$(node -p "require('./package.json').version")
            RANGE="HEAD"
            echo "No previous tag — base version from package.json: $BASE"
          else
            BASE="${LAST_TAG#v}"
            RANGE="${LAST_TAG}..HEAD"
            echo "Last tag: $LAST_TAG  →  base: $BASE"
          fi

          # ── collect commits in range ──────────────────────────────────────
          COMMITS=$(git log "$RANGE" --format="%s" 2>/dev/null || \
                    git log        --format="%s")

          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag — skipping release."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── classify bump ─────────────────────────────────────────────────
          MAJOR=0; MINOR=0; PATCH=0

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\([^)]+\))?!:' || \
               echo "$msg" | grep -qiE 'BREAKING[[:space:]]CHANGE'; then
              MAJOR=1
            elif echo "$msg" | grep -qE '^feat(\([^)]+\))?:'; then
              MINOR=1
            elif echo "$msg" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
              PATCH=1
            fi
          done <<< "$COMMITS"

          if [ "$MAJOR" -eq 0 ] && [ "$MINOR" -eq 0 ] && [ "$PATCH" -eq 0 ]; then
            echo "No releasable commits (no feat/fix/perf/breaking) — skipping."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── compute new version ───────────────────────────────────────────
          IFS='.' read -r VMAJ VMIN VPAT <<< "$BASE"
          if   [ "$MAJOR" -eq 1 ]; then VMAJ=$((VMAJ+1)); VMIN=0; VPAT=0
          elif [ "$MINOR" -eq 1 ]; then VMIN=$((VMIN+1)); VPAT=0
          else                           VPAT=$((VPAT+1))
          fi

          NEXT="${VMAJ}.${VMIN}.${VPAT}"
          echo "Next version: $NEXT"
          echo "next_version=$NEXT"  >> "$GITHUB_OUTPUT"
          echo "release_needed=true" >> "$GITHUB_OUTPUT"

          # ── build changelog ───────────────────────────────────────────────
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's changed"
            echo ""
            git log "$RANGE" --format="- %s (%h)" 2>/dev/null || \
            git log          --format="- %s (%h)"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build all targets + tag + release  (single ubuntu runner, cross-compile)
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: version
    if: needs.version.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Generate migrations.generated.ts (needed by the build)
      - name: Bundle migrations
        run: bun scripts/bundle-migrations.ts

      # Cross-compile all three targets in one job — no macOS runners needed
      - name: Build binaries
        run: |
          bun build --compile --target=bun-darwin-arm64  --outfile dist/ytui-macos-arm64   ./src/index.ts
          bun build --compile --target=bun-darwin-x64    --outfile dist/ytui-macos-x86_64  ./src/index.ts
          bun build --compile --target=bun-linux-x64     --outfile dist/ytui-linux-x86_64  ./src/index.ts

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package.json and tag
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git add package.json
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git push
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ needs.version.outputs.changelog }}
          files: |
            dist/ytui-macos-arm64
            dist/ytui-macos-x86_64
            dist/ytui-linux-x86_64
