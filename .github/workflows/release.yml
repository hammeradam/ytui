name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Determine the next version from conventional commits
  # ────────────────────────────────────────────────────────────────────────────
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.bump.outputs.next_version }}
      release_needed: ${{ steps.bump.outputs.release_needed }}
      changelog: ${{ steps.bump.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version bump
        id: bump
        run: bash scripts/compute-version.sh
  # ────────────────────────────────────────────────────────────────────────────
  # 2. Cross-compile all binaries on ubuntu, upload as artifacts
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build binaries
    needs: version
    if: needs.version.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bundle migrations
        run: bun scripts/bundle-migrations.ts

      - name: Build binaries
        run: |
          bun build --compile --target=bun-darwin-arm64 --outfile dist/ytui-macos-arm64  ./src/index.ts
          bun build --compile --target=bun-darwin-x64   --outfile dist/ytui-macos-x86_64 ./src/index.ts
          bun build --compile --target=bun-linux-x64    --outfile dist/ytui-linux-x86_64 ./src/index.ts

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Ad-hoc sign macOS binaries (codesign is a macOS-only tool)
  # ────────────────────────────────────────────────────────────────────────────
  sign-macos:
    name: Sign macOS binaries
    needs: [version, build]
    if: needs.version.outputs.release_needed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Ad-hoc codesign
        run: |
          chmod +x dist/ytui-macos-arm64 dist/ytui-macos-x86_64
          codesign --sign - --force --preserve-metadata=entitlements \
            dist/ytui-macos-arm64
          codesign --sign - --force --preserve-metadata=entitlements \
            dist/ytui-macos-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-signed
          path: dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Bump version, tag, create GitHub Release
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [version, build, sign-macos]
    if: needs.version.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-signed
          path: dist/

      # Linux binary wasn't re-uploaded in sign-macos — grab it from the
      # original artifact and merge into dist/
      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist-orig/

      - name: Merge linux binary
        run: cp dist-orig/ytui-linux-x86_64 dist/ytui-linux-x86_64

      - name: Mark binaries executable
        run: chmod +x dist/ytui-macos-arm64 dist/ytui-macos-x86_64 dist/ytui-linux-x86_64

      - name: Package as tarballs
        run: |
          tar -czf dist/ytui-macos-arm64.tar.gz  -C dist ytui-macos-arm64
          tar -czf dist/ytui-macos-x86_64.tar.gz -C dist ytui-macos-x86_64
          tar -czf dist/ytui-linux-x86_64.tar.gz -C dist ytui-linux-x86_64

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package.json and tag
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git add package.json
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git push
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ needs.version.outputs.changelog }}
          files: |
            dist/ytui-macos-arm64.tar.gz
            dist/ytui-macos-x86_64.tar.gz
            dist/ytui-linux-x86_64.tar.gz
